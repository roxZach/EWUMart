<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EWUMart — Admin Login</title>
    <meta name="description" content="Admin and staff login portal for EWUMart." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --brand:      #2563a8;
        --brand-mid:  #3b7bc8;
        --brand-light:#e8f0fb;
        --danger:     #dc2626;
        --danger-light:#fee2e2;
        --surface:    #ffffff;
        --bg:         #f4f6fa;
        --bg2:        #edf0f6;
        --border:     #dde2ec;
        --text:       #111827;
        --text2:      #4b5563;
        --text3:      #9ca3af;
        --success:    #16a34a;
        --r:          10px;
        --r-lg:       16px;
        --sh:         0 2px 12px rgba(0,0,0,0.07);
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* ── CARD ── */
      .card {
        background: var(--surface);
        border-radius: var(--r-lg);
        box-shadow: 0 8px 40px rgba(0,0,0,0.12);
        width: 100%;
        max-width: 420px;
        padding: 40px 36px 36px;
      }

      /* ── BRAND ── */
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
      }
      .brand-logo {
        width: 44px;
        height: 44px;
        background: var(--brand);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 16px;
        flex-shrink: 0;
      }
      .brand-text { display: flex; flex-direction: column; }
      .brand-name {
        font-family: "Syne", sans-serif;
        font-size: 20px;
        font-weight: 800;
        color: var(--brand);
      }
      .brand-name span { color: var(--text); }
      .brand-sub {
        font-size: 11px;
        font-weight: 600;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      h2 {
        font-family: "Syne", sans-serif;
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .sub {
        font-size: 13px;
        color: var(--text2);
        margin-bottom: 28px;
        line-height: 1.5;
      }

      /* ── ADMIN BADGE ── */
      .admin-badge {
        display: flex;
        align-items: center;
        gap: 7px;
        background: #fff7ed;
        color: #b45309;
        border: 1px solid #fde68a;
        border-radius: var(--r);
        padding: 9px 13px;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 22px;
      }

      /* ── FORM ── */
      .fg { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
      label { font-size: 13px; font-weight: 600; color: var(--text2); }
      input {
        width: 100%;
        padding: 10px 13px;
        border: 1.5px solid var(--border);
        border-radius: var(--r);
        font-size: 14px;
        font-family: "Inter", sans-serif;
        background: var(--surface);
        color: var(--text);
        transition: border-color 0.15s, box-shadow 0.15s;
        outline: none;
      }
      input:focus {
        border-color: var(--brand-mid);
        box-shadow: 0 0 0 3px rgba(59,123,200,0.15);
      }

      /* ── BUTTON ── */
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 20px;
        border-radius: var(--r);
        font-size: 14px;
        font-weight: 600;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        border: none;
        width: 100%;
        margin-top: 8px;
        transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      }
      .btn:active { transform: scale(0.98); }
      .btn-primary {
        background: var(--brand);
        color: #fff;
      }
      .btn-primary:hover { background: #1d50a0; box-shadow: 0 4px 14px rgba(37,99,168,0.35); }
      .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

      /* ── ERROR / SUCCESS ── */
      .msg {
        font-size: 13px;
        padding: 10px 13px;
        border-radius: var(--r);
        margin-bottom: 14px;
        display: none;
        align-items: flex-start;
        gap: 8px;
      }
      .msg.error   { background: var(--danger-light); color: var(--danger); }
      .msg.success { background: #dcfce7; color: var(--success); }
      .msg.visible { display: flex; }

      /* ── BACK LINK ── */
      .back-link {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text3);
        text-decoration: none;
        margin-top: 22px;
        justify-content: center;
        transition: color 0.15s;
      }
      .back-link:hover { color: var(--brand-mid); }

      /* ── DIVIDER ── */
      .divider {
        border: none;
        border-top: 1.5px solid var(--border);
        margin: 24px 0;
      }

      /* ── LOADER OVERLAY ── */
      #loader {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        z-index: 999;
        align-items: center;
        justify-content: center;
      }
      #loader.on { display: flex; }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(255,255,255,0.25);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>

    <!-- Full-screen loader -->
    <div id="loader"><div class="spinner"></div></div>

    <div class="card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-logo">EM</div>
        <div class="brand-text">
          <div class="brand-name">EWU<span>Mart</span></div>
          <div class="brand-sub">Admin Portal</div>
        </div>
      </div>

      <h2>Staff Login</h2>
      <p class="sub">This portal is for administrators and authorized staff only. Students must use the <a href="/" style="color:var(--brand-mid)">main app</a>.</p>

      <div class="admin-badge">
        <i class="ph-bold ph-shield-check" style="font-size:14px"></i>
        Restricted access — authorized personnel only
      </div>

      <!-- Error / Success message -->
      <div class="msg error" id="err-msg">
        <i class="ph-bold ph-warning-circle"></i>
        <span id="err-text">Invalid email or password.</span>
      </div>
      <div class="msg success" id="ok-msg">
        <i class="ph-bold ph-check-circle"></i>
        <span>Login successful! Redirecting…</span>
      </div>

      <!-- Form -->
      <div class="fg">
        <label for="a-email">Email Address</label>
        <input id="a-email" type="email" placeholder="admin@ewubd.edu" autocomplete="username" />
      </div>
      <div class="fg">
        <label for="a-pass">Password</label>
        <input id="a-pass" type="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')adminLogin()" />
      </div>

      <button class="btn btn-primary" id="login-btn" onclick="adminLogin()">
        <i class="ph-bold ph-sign-in" style="font-size:16px"></i>
        Sign In
      </button>

      <hr class="divider" />

      <a class="back-link" href="/">
        <i class="ph-bold ph-arrow-left"></i>
        Back to EWUMart Student App
      </a>
    </div>

    <script>
      const API = "/api";

      async function adminLogin() {
        const email = document.getElementById("a-email").value.trim();
        const pass  = document.getElementById("a-pass").value;
        const btn   = document.getElementById("login-btn");

        document.getElementById("err-msg").classList.remove("visible");
        document.getElementById("ok-msg").classList.remove("visible");

        if (!email || !pass) {
          showErr("Please enter your email and password.");
          return;
        }

        btn.disabled = true;
        document.getElementById("loader").classList.add("on");

        try {
          const res = await fetch(`${API}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, pw: pass }),
          });

          const data = await res.json();

          if (!res.ok) {
            showErr(data.error || "Login failed.");
            return;
          }

          // Store session then redirect to the main app
          localStorage.setItem("ewumart_session", JSON.stringify(data));
          document.getElementById("ok-msg").classList.add("visible");
          setTimeout(() => { window.location.href = "/"; }, 800);

        } catch (e) {
          showErr("Cannot reach the server. Make sure it is running.");
        } finally {
          btn.disabled = false;
          document.getElementById("loader").classList.remove("on");
        }
      }

      function showErr(msg) {
        document.getElementById("err-text").textContent = msg;
        document.getElementById("err-msg").classList.add("visible");
      }
    </script>
  </body>
</html>
